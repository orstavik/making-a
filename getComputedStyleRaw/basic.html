<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Droid+Sans:400,700">
<style>
  :root {
    font-size: 10px;
  }

  /*selectors*/
  span.d {
    border-bottom: 2rem solid #0f0;
  }

  span:where(.d) {
    border-bottom: 1rem dotted #000;
  }

  @layer a {
    span.a>span:has(#c, .d) span:first-child:not(.x, #x[bob~="#somethign:else"]) {
      border-left: 1rem dotted #000 !important;
    }

    span.a>span:has(#c, .d) span:first-child:not(.x.x > #x, #x[bob*="#somethign"]) {
      border-left: 2rem solid #0f0 !important;
    }

    span.a>span:has(#c, .d) span:first-child:not(.x, #x[bob*="#somethign"]) {
      border-left: 2rem dotted #000 !important;
    }

    @keyframes anime {
      from {
        border-width: 0;
      }

      to {
        border-width: 10rem;
      }
    }
  }

  @layer b {
    span.a>span:has(#c, .d) span:first-child:not(.d, #dummy[bob$="##somethign"]) {
      border-left: 1rem dotted #000 !important;
    }
  }

  /*media and supports filtered out*/
  @supports(display: block) {
    @media (max-width: 1px) {
      div {
        border-bottom: 10rem pink solid !important;
      }
    }
  }

  @media (min-width: 1px) {
    @supports(foo: bar) {
      div {
        border-bottom: 10rem pink solid !important;
      }
    }
  }

  /*media and supports filtered in*/
  @layer alice {
    @media (min-width: 1px) {
      @supports(display: block) {
        @layer bob {
          div {
            border-top: 1rem solid #0f0;
            border-left: 1rem solid #0f0 !important;
            border-right: 1rem solid #0f0;
          }
        }
      }
    }
  }


  @layer id {
    #top {
      border-top: 2rem solid #f00;
      border-left: 2rem solid #f00 !important;
      border-right: 2rem solid #f00 !important;
    }
  }

  @layer clz {
    .top {
      border-top: 1rem dotted #000;
      border-left: 1rem dotted #000 !important;
      border-right: 1rem dotted #000;
    }

    .top.top.top {
      border-top: 4rem solid #00f;
      border-left: 4rem dotted #00f !important;
      border-right: 4rem solid #00f !important;
    }

    .top.top {
      border-top: 3rem dotted #000;
      border-left: 3rem dotted #000 !important;
      border-right: 3rem dotted #000;
    }
  }

  @layer one, two;

  @layer two {
    div {
      font-family: "ui-monospace", monospace;
    }
  }

  @layer one {
    div {
      font-family: "Gill Sans Extrabold", sans-serif;
    }
  }

  /* 1. :is() and :where() Specificity Spec */
  :where(.where-test) {
    padding-top: 1rem;
  }

  /* Specificity: 0, 0, 0 */
  .where-test {
    padding-top: 2rem;
  }

  /* Specificity: 0, 1, 0 (Wins) */

  :is(#dummy, .is-test) {
    padding-bottom: 3rem;
  }

  /* Specificity takes max argument: 1, 0, 0 (Wins) */
  .is-test {
    padding-bottom: 2rem;
  }

  /* Specificity: 0, 1, 0 */

  /* 2. Source Order Fallback Spec */
  .source-order-test {
    text-indent: 1rem;
  }

  .source-order-test {
    text-indent: 2rem;
  }

  /* Identical specificity, later source wins */

  /* 3. Inline vs !important Spec */
  .important-test {
    margin-top: 1rem !important;
    margin-bottom: 1rem;
  }

  /* 4. Layer !important Inversion Spec */
  @layer bottom, top;

  @layer bottom {
    .layer-imp-test {
      margin-left: 1rem !important;
      margin-right: 1rem;
    }
  }

  @layer top {
    .layer-imp-test {
      margin-left: 2rem !important;
      margin-right: 2rem;
    }
  }

  /* Unlayered */
  .layer-imp-test {
    margin-left: 3rem !important;
    margin-right: 3rem;
  }

  /*pseudo check*/
  .santa::after {
    content: "🎅";
    margin: 2rem;
  }

  div.santa {
    margin: 1rem;
  }
</style>

<span id=a class=a>a<span id=b class=b>b<span id=c class=c>c</span><span id=d class=d>d</span></span></span>

<div class="top">.top</div>
<div id="top">#top</div>
<div id="top" class="top">#top.top</div>
<div>div</div>

<div class="where-test">Specificity: :where()</div>
<div class="is-test">Specificity: :is()</div>
<div class="source-order-test">Source Order</div>

<div class="important-test" style="margin-top: 2rem; margin-bottom: 2rem;">Inline vs CSS !important</div>

<div class="layer-imp-test">Layer !important Inversion</div>

<div class="santa">hello christmas</div>

<script type="module">
  import { GetComputedStyleRaw } from "../getComputedStyleRaw.js";
  const { getComputedStyleRaw, rules, others } = await GetComputedStyleRaw({ urlRewriter: url => "https://offcors.2js-no.workers.dev/?url=" + url });

  function test(el, pseudo) {
    const raw = getComputedStyleRaw(el, pseudo);
    if (!Object.keys(raw).length)
      return true;
    const tmp = getComputedStyle(el, pseudo);
    const comp = {};
    const raw2 = {};
    for (let p in raw) {
      comp[p] = tmp[p];
      raw2[p] = raw[p].endsWith("rem") ? raw[p].slice(0, -3) + "0px" : raw[p];
    }
    const success = JSON.stringify(raw) != JSON.stringify(comp) && JSON.stringify(raw2) == JSON.stringify(comp);
    if (!success) {
      debugger;
      getComputedStyleRaw(el, pseudo);
    }
    return success;
  }

  const expectedOthers = [
    `@font-face { font-family: "Droid Sans"; font-style: normal; font-weight: 400; src: url("https://fonts.gstatic.com/s/droidsans/v19/SlGVmQWMvZQIdix7AFxXkHNSbQ.woff2") format("woff2"); unicode-range: U+0-FF, U+131, U+152-153, U+2BB-2BC, U+2C6, U+2DA, U+2DC, U+304, U+308, U+329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }`,
    `@font-face { font-family: "Droid Sans"; font-style: normal; font-weight: 700; src: url("https://fonts.gstatic.com/s/droidsans/v19/SlGWmQWMvZQIdix7AFxXmMh3eDs1Zw.woff2") format("woff2"); unicode-range: U+0-FF, U+131, U+152-153, U+2BB-2BC, U+2C6, U+2DA, U+2DC, U+304, U+308, U+329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }`,
    `@keyframes anime { 
  0% { border-width: 0px; }
  100% { border-width: 10rem; }
}`,
  ];

  for (let { rule: { cssText } } of others) {
    cssText = cssText.trim();
    if (expectedOthers.includes(cssText))
      console.log(`✅OK: Rule correctly extracted:\n${cssText}\n`);
    else
      console.log(`❌ERROR: Extracted rule does not match stylesheet rule:\n${cssText}\n`);
  }

  for (let el of document.querySelectorAll("div,span"))
    console.log(`${test(el) ? "✅OK" : "❌ERROR"}: ${el.innerText}\n`);
  console.log(`${test(document.querySelector(".santa"), "::after") ? "✅OK" : "❌ERROR"}: .santa::after\n`);
</script>
