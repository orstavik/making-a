<!-- since they are lacking crossorigin="anonymous", their .cssRules become cors protected. -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6/css/all.min.css">

<style>
  div {
    font-family: 'Roboto', 'Times New Roman', Times, serif;
    font-size: 3rem;
    border-bottom: 2rem solid #0f0;
  }
</style>

<i class="fa-solid fa-golf-ball"></i>
<div>hello roboto</div>
<script type="module">
  import { GetComputedStyleRaw } from "../getComputedStyleRaw.js";

  function replaceStyle(others, raw) {
    document.head.querySelectorAll("style, link").forEach(s => s.remove());
    const style = document.createElement("style");
    let txt = others.join("");
    for (let k in raw)
      txt += `${k} {${Object.entries(raw[k]).map(([p, v]) => `${p.replaceAll(/([A-Z])/g, "-$1").toLowerCase()}: ${v};`).join(" ")} }`;
    style.textContent = txt;
    document.head.appendChild(style);
  }

  const urlRewriter = url => "https://offcors.2js-no.workers.dev/?url=" + url;
  const getRaw = await GetComputedStyleRaw({ urlRewriter });
  const others = getRaw().map(o => o.rule.cssText);

  const el = document.querySelector("div");
  const cs = window.getComputedStyle(el);
  const raw = getRaw(el);
  const body = getRaw(document.body);
  const divBefore = getRaw(el, ":before");
  debugger
  console.log(`${cs.fontFamily === raw.fontFamily ? "✅OK" : "❌ERROR"}: font-family\n`);

  replaceStyle(others, { div: raw, body });
</script>
